services:
  postgres:
    image: postgres:16-alpine
    container_name: toktok-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: toktok_lms
      POSTGRES_USER: toktok
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U toktok -d toktok_lms"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
