services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: toktok-lms-web:latest
    container_name: toktok-web
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      APP_NAME: TokTok LMS
      APP_ENV: local
      APP_KEY: ${APP_KEY}
      APP_DEBUG: "true"
      APP_URL: http://localhost:8080
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: toktok_lms
      DB_USERNAME: toktok
      DB_PASSWORD: secret
      SESSION_DRIVER: database
      CACHE_STORE: database
      QUEUE_CONNECTION: database
      WAIT_FOR_DB: "true"
      RUN_MIGRATIONS: "true"
      RUN_SEEDERS: "true"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: toktok-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: toktok_lms
      POSTGRES_USER: toktok
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U toktok -d toktok_lms"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
